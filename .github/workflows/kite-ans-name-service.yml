name: kite-ans-name-service

# Runs only when this plugin (or its workflow) changes, so each plugin is
# built and tested independently.
on:
  push:
    paths:
      - 'kite-ans-name-service/**'
      - '.github/workflows/kite-ans-name-service.yml'
  pull_request:
    paths:
      - 'kite-ans-name-service/**'
      - '.github/workflows/kite-ans-name-service.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kite-ans-name-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: kite-ans-name-service/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:ci
