name: kit-plugin-metaplex

# Runs only when this plugin (or its workflow) changes, so each plugin is
# built and tested independently.
on:
  push:
    paths:
      - 'kit-plugin-metaplex/**'
      - '.github/workflows/kit-plugin-metaplex.yml'
  pull_request:
    paths:
      - 'kit-plugin-metaplex/**'
      - '.github/workflows/kit-plugin-metaplex.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kit-plugin-metaplex
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: kit-plugin-metaplex/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:ci
      # Regenerate the Codama client from the checked-in IDL and fail if it drifts.
      - name: Verify generated client matches the IDL
        run: |
          npm run generate
          git diff --exit-code -- src/generated
