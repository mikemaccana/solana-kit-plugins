name: kit-plugin-pyth

# Runs only when this plugin (or its workflow) changes, so each plugin is
# built and tested independently.
on:
  push:
    paths:
      - 'kit-plugin-pyth/**'
      - '.github/workflows/kit-plugin-pyth.yml'
  pull_request:
    paths:
      - 'kit-plugin-pyth/**'
      - '.github/workflows/kit-plugin-pyth.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kit-plugin-pyth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: kit-plugin-pyth/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:ci
